publish_to: 'none' 

# App Version
version: 1.0.0+1

environment:
  sdk: ">=3.11.1 <5.0.0"

# dependencies
dependencies:
  flutter:
    sdk: flutter

  # For IOS style Icons 
  cupertino_icons: ^1.0.8
  
  # HTTP Client
  dio: ^5.8.0+1

  # For Logs
  logger: ^2.7.0
  
# Dev Dependencies 
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # For add assets in our application,
  assets:
    - assets/images/
